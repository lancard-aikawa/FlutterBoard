<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlutterBoard — テストリリース</title>
  <link rel="stylesheet" href="shared/base.css">
  <link rel="stylesheet" href="release.css">
</head>
<body>
  <header>
    <h1>FlutterBoard — 🚀 テストリリース</h1>
    <div id="release-project" class="release-project">プロジェクト未選択</div>
    <nav class="entry-nav">
      <a href="/index.html">🛠 開発</a>
      <a href="/release.html" class="active">🚀 リリース</a>
    </nav>
  </header>

  <main class="release-main">
    <!-- プロジェクト未選択時のヒント -->
    <section id="release-no-project" class="release-placeholder hidden">
      <h2>テストリリース支援</h2>
      <p>Android Internal Testing / Firebase App Distribution への提出前チェックを支援します。</p>
      <div class="release-project-hint">
        ※ まず開発ダッシュボードでプロジェクトを選択してください。
      </div>
    </section>

    <!-- Pre-flight チェック（D1） -->
    <section id="preflight-panel" class="preflight-panel hidden">
      <div class="preflight-header">
        <h2>Pre-flight チェック</h2>
        <div class="preflight-actions">
          <button type="button" id="preflight-run-btn" class="btn-primary">チェック実行 ▶</button>
          <span id="preflight-status" class="preflight-status"></span>
        </div>
      </div>
      <div id="preflight-summary" class="preflight-summary hidden"></div>
      <div id="preflight-results" class="preflight-results"></div>
    </section>

    <!-- リリースノート自動生成（D3） -->
    <section id="relnotes-panel" class="relnotes-panel hidden">
      <div class="relnotes-header">
        <h2>リリースノート自動生成</h2>
        <div class="relnotes-actions">
          <label class="relnotes-from">
            基準タグ:
            <select id="relnotes-from-select">
              <option value="">（最新タグを自動選択）</option>
            </select>
          </label>
          <label class="relnotes-opt">
            <input type="checkbox" id="relnotes-include-other" checked>
            その他を含める
          </label>
          <button type="button" id="relnotes-gen-btn" class="btn-primary">生成 ▶</button>
          <span id="relnotes-status" class="relnotes-status"></span>
        </div>
      </div>
      <div id="relnotes-meta" class="relnotes-meta hidden"></div>
      <div class="relnotes-body hidden" id="relnotes-body">
        <div class="relnotes-toolbar">
          <button type="button" id="relnotes-copy-btn" class="btn-secondary">📋 Markdown をコピー</button>
          <span id="relnotes-copy-status" class="relnotes-copy-status"></span>
        </div>
        <textarea id="relnotes-markdown" class="relnotes-markdown" spellcheck="false"></textarea>
        <details class="relnotes-commits">
          <summary>対象コミット <span id="relnotes-count">0</span> 件</summary>
          <ul id="relnotes-commit-list" class="relnotes-commit-list"></ul>
        </details>
      </div>
    </section>
  </main>

  <script src="shared/project.js"></script>
  <script src="app-release.js"></script>
</body>
</html>
